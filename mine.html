<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My World 🌍</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
    color: white;
    overflow-x: hidden;
}

/* Floating circles (dynamic bg) */
.circle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    animation: float 10s infinite linear;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* Header */
header {
    text-align: center;
    padding: 20px;
    font-size: 28px;
}

/* Gallery */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 15px;
    padding: 20px;
}

/* Card */
.card {
    border-radius: 15px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
}

/* Image */
.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.4s;
}

/* Hover */
.card:hover img {
    transform: scale(1.15);
    filter: brightness(0.8);
}

/* FULLSCREEN */
.preview {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(8px);

    display: flex;
    justify-content: center;
    align-items: center;

    opacity: 0;
    visibility: hidden;
    transition: 0.4s;
}

.preview.active {
    opacity: 1;
    visibility: visible;
}

/* Big image */
.preview img {
    max-width: 90%;
    max-height: 80%;
    border-radius: 20px;
    animation: zoom 0.4s ease;
}

@keyframes zoom {
    from { transform: scale(0.6); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* Close */
.close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 30px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- Dynamic Background -->
<script>
for(let i = 0; i < 20; i++) {
    let c = document.createElement("div");
    c.className = "circle";

    let size = Math.random() * 80 + 20;
    c.style.width = size + "px";
    c.style.height = size + "px";
    c.style.left = Math.random() * 100 + "vw";
    c.style.animationDuration = (5 + Math.random() * 10) + "s";

    document.body.appendChild(c);
}
</script>

<header>rampujariii 🌍</header>

<div class="gallery">
    <div class="card"><img src="r4.JPG" onclick="openImg(this.src)"></div>
    <div class="card"><img src="r3.jpeg" onclick="openImg(this.src)"></div>
    <div class="card"><img src="r5.jpg" onclick="openImg(this.src)"></div>
    <div class="card"><img src="r1.jpeg" onclick="openImg(this.src)"></div>
    <div class="card"><img src="r2.jpeg" onclick="openImg(this.src)"></div>
    <div class="card"><img src="r6.jpg" onclick="openImg(this.src)"></div>
    <div class="card"><img src="r7.jpeg" onclick="openImg(this.src)"></div>
    <div class="card"><img src="r8.jpeg" onclick="openImg(this.src)"></div>
    <!--<div class="card"><img src="r1.jpeg" onclick="openImg(this.src)"></div>
    <div class="card"><img src="r2.jpeg" onclick="openImg(this.src)"></div> -->
</div>

<!-- Preview -->
<div class="preview" id="preview">
    <span class="close" onclick="closeImg()">✖</span>
    <img id="previewImg">
</div>

<script>
function openImg(src) {
    document.getElementById("previewImg").src = src;
    document.getElementById("preview").classList.add("active");
}

function closeImg() {
    document.getElementById("preview").classList.remove("active");
}
</script>

</body>
</html>
