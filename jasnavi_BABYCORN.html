<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jasnavi 💖</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: white;
}

/* Header */
header {
    text-align: center;
    padding: 20px;
    font-size: 28px;
    letter-spacing: 1px;
}

/* Floating hearts */
.heart {
    position: absolute;
    font-size: 20px;
    opacity: 0.6;
    animation: float 8s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* Gallery */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 15px;
    padding: 20px;
}

/* Card */
.card {
    border-radius: 15px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
}

/* Image */
.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.4s;
}

/* Hover */
.card:hover img {
    transform: scale(1.15);
    filter: brightness(0.8);
}

/* Overlay text */
.card::after {
    content: "💖";
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    transition: 0.3s;
}

.card:hover::after {
    opacity: 1;
}

/* FULLSCREEN VIEW */
.preview {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(8px);

    display: flex;
    justify-content: center;
    align-items: center;

    opacity: 0;
    visibility: hidden;
    transition: 0.4s;
}

.preview.active {
    opacity: 1;
    visibility: visible;
}

/* Big image */
.preview img {
    max-width: 90%;
    max-height: 80%;
    border-radius: 20px;
    animation: zoom 0.4s ease;
}

@keyframes zoom {
    from { transform: scale(0.6); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* Close */
.close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 30px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- Floating Hearts -->
<script>
for(let i = 0; i < 25; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (5 + Math.random() * 5) + "s";

    document.body.appendChild(heart);
}
</script>

<header>jasnavi_BABYCORN 💖</header>

<div class="gallery">
    <div class="card"><img src="b1.jpeg" onclick="openImg(this.src)"></div>
    <div class="card"><img src="b2.jpeg" onclick="openImg(this.src)"></div>
    <div class="card"><img src="b3.jpeg" onclick="openImg(this.src)"></div>
    <div class="card"><img src="b4.jpeg" onclick="openImg(this.src)"></div>
    <div class="card"><img src="b5.jpeg" onclick="openImg(this.src)"></div>
</div>


<!-- Preview -->
<div class="preview" id="preview">
    <span class="close" onclick="closeImg()">✖</span>
    <img id="previewImg">
</div>

<script>
function openImg(src) {
    document.getElementById("previewImg").src = src;
    document.getElementById("preview").classList.add("active");
}

function closeImg() {
    document.getElementById("preview").classList.remove("active");
}
</script>

</body>
</html>
