<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jasnavi ❤️</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(to top, #ffd1dc, #ffe6f0, #fff0f5);
}

/* Sakura petals */
.petal {
    position: absolute;
    width: 15px;
    height: 15px;
    background: pink;
    border-radius: 50% 50% 50% 0;
    opacity: 0.7;
    animation: fall linear infinite;
}

@keyframes fall {
    0% {
        transform: translateY(-10vh) rotate(0deg);
    }
    100% {
        transform: translateY(110vh) rotate(360deg);
    }
}

/* Login Card */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    color: #ff4d88;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    width: 300px;
}

/* Title */
.card h2 {
    margin-bottom: 20px;
}

/* Input */
input {
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 10px;
    margin-top: 10px;
}

/* Button */
button {
    margin-top: 20px;
    padding: 10px 25px;
    border: none;
    border-radius: 20px;
    background: #ff4d88;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    background: #ff1a66;
}
</style>
</head>

<body>

<!-- Sakura Petals -->
<script>
for(let i = 0; i < 30; i++) {
    let petal = document.createElement("div");
    petal.classList.add("petal");

    petal.style.left = Math.random() * 100 + "vw";
    petal.style.animationDuration = (5 + Math.random() * 5) + "s";
    petal.style.opacity = Math.random();

    document.body.appendChild(petal);
}
</script>

<!-- Login Card -->
<div class="card">
    <h2>🌸 Welcome Jasnavi 🌸</h2>
    <p>Enter the secret to my heart 💖</p>

    <input type="password" id="password" placeholder="Password">
    <button onclick="checkPassword()">Unlock</button>
</div>

<script>

function checkPassword() {
    let pass = document.getElementById("password").value;

    if(pass === "babycorn") {
        window.location.href = "home.html"; // 🔥 redirect
    } else {
        alert("Wrong Password 😢");
    }

}
</script>

</body>
</html>
